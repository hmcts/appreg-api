type: object
description: A persons full name.
required:
  - surname
  - firstForename

properties:

  title:
    type: string
    # Name regex from legacy.
    pattern: |-
      ^[A-Za-z\u00C0-\u024F](?:[A-Za-z\u00C0-\u024F .'\-]*[A-Za-z\u00C0-\u024F])?$
    description: Prefix before a persons name.
    example: "Mr, Mrs"
    maxLength: 100

  surname:
    type: string
    description: The persons family name.
    # Name regex from legacy.
    pattern: |-
      ^[A-Za-z\u00C0-\u024F](?:[A-Za-z\u00C0-\u024F .'\-]*[A-Za-z\u00C0-\u024F])?$
    example: "Smith"
    maxLength: 100

  firstForename:
    type: string
    description: The persons first name.
    # Name regex from legacy.
    pattern: |-
      ^[A-Za-z\u00C0-\u024F](?:[A-Za-z\u00C0-\u024F .'\-]*[A-Za-z\u00C0-\u024F])?$
    example: "John"
    maxLength: 100

  secondForename:
    type: string
    description: The persons optional second name.
    nullable: true
    # Name regex from legacy.
    pattern: |-
      ^[A-Za-z\u00C0-\u024F](?:[A-Za-z\u00C0-\u024F .'\-]*[A-Za-z\u00C0-\u024F])?$
    maxLength: 100

  thirdForename:
    type: string
    description: The persons optional third name.
    nullable: true
    # Name regex from legacy.
    pattern: |-
      ^[A-Za-z\u00C0-\u024F](?:[A-Za-z\u00C0-\u024F .'\-]*[A-Za-z\u00C0-\u024F])?$
    maxLength: 100
