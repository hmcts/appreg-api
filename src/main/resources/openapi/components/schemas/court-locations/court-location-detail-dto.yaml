type: object
description: Immutable DTO representing a detailed Court Location.
required:
  - id
  - name
  - locationCode
  - startDate
properties:
  id:
    type: integer
    format: int64
    description: Primary key identifier.
  name:
    type: string
    description: Human-readable court name.
  locationCode:
    type: string
    description: Code that identifies the court location.
  startDate:
    type: string
    format: date
    description: Start date from which the court location reference data is valid.
  endDate:
    type: string
    format: date
    nullable: true
    description: End date until which the court location reference data is valid.
