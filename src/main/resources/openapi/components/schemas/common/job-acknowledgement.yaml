type: object
description: Acknowledgement returned when a background job is created.
additionalProperties: false
required:
  - id
  - type
  - status

properties:

  id:
    type: string
    format: uuid
    description: Unique identifier for the job.
    example: "9f7b2a35-57ac-4a1c-9c41-83b6c8157af4"

  type:
    type: string
    description: Logical job type (e.g., "report:fees", "bulk:upload").
    example: "report:fees"

  status:
    $ref: './job-status.yaml'

